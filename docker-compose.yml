services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-images}
    # Host port defaults to 5433 to avoid clashing with a locally-installed
    # PostgreSQL on 5432. Only needed for host-side access (e.g. npm run start:dev);
    # the API itself reaches the DB via the internal `db:5432`.
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-images}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-images}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      STORAGE_DIR: /app/storage
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      MAX_IMAGE_DIMENSION: ${MAX_IMAGE_DIMENSION:-4000}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - storage:/app/storage

volumes:
  pgdata:
  storage:
